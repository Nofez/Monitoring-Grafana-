version: '3.8'

services:
  grafana:
    image: grafana/grafana:11.6.16
    container_name: grafana
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - grafana_network
      - grafana_prometheus


networks:
  grafana_network:
    name: grafana_network
    driver: bridge

  grafana_prometheus:
    name: grafana_prometheus
    external: true

volumes:
  grafana_data:


